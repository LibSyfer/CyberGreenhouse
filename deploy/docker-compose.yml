services:
  security-monitor:
    image: ${DOCKER_REGISTRY-}cybergreenhousesecuritymonitor
    build:
      context: ..
      dockerfile: src/Core/CyberGreenhouse.SecurityMonitor/Dockerfile


  main-control:
    image: ${DOCKER_REGISTRY-}cybergreenhousemaincontrol
    build:
      context: ..
      dockerfile: src/Modules/CyberGreenhouse.MainControl/Dockerfile
    ports:
      - 8080:8080


  climate-control:
    image: ${DOCKER_REGISTRY-}cybergreenhouseclimatecontrol
    build:
      context: ..
      dockerfile: src/Modules/CyberGreenhouse.ClimateControl/Dockerfile

      
  harvesting:
    image: ${DOCKER_REGISTRY-}cybergreenhouseharvesting
    build:
      context: ..
      dockerfile: src/Modules/CyberGreenhouse.Harvesting/Dockerfile
    ports:
      - 8081:8080


  irrigation:
    image: ${DOCKER_REGISTRY-}cybergreenhouseirrigation
    build:
      context: ..
      dockerfile: src/Modules/CyberGreenhouse.Irrigation/Dockerfile


  lighting:
    image: ${DOCKER_REGISTRY-}cybergreenhouselighting
    build:
      context: ..
      dockerfile: src/Modules/CyberGreenhouse.Lighting/Dockerfile


  planting:
    image: ${DOCKER_REGISTRY-}cybergreenhouseplanting
    build:
      context: ..
      dockerfile: src/Modules/CyberGreenhouse.Planting/Dockerfile
    ports:
      - 8082:8080


  ripeness-monitor:
    image: ${DOCKER_REGISTRY-}cybergreenhouseripenessmonitor
    build:
      context: ..
      dockerfile: src/Modules/CyberGreenhouse.RipenessMonitor/Dockerfile


  plantdata-signature-checker:
    image: ${DOCKER_REGISTRY-}cybergreenhouseplantdatasignaturechecker
    build:
      context: ..
      dockerfile: src/Modules/CyberGreenhouse.PlantDataSignatureChecker/Dockerfile

